<div class="auth-page">
  <div class="auth-card glass-strong">
    <h1 class="auth-title">ITPlotter</h1>
    <p class="auth-subtitle">Создать новый аккаунт</p>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">Имя</label>
          <input
            id="firstName"
            type="text"
            [(ngModel)]="firstName"
            name="firstName"
            placeholder="Иван"
            required
          />
        </div>
        <div class="form-group">
          <label for="lastName">Фамилия</label>
          <input
            id="lastName"
            type="text"
            [(ngModel)]="lastName"
            name="lastName"
            placeholder="Иванов"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Электронная почта</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Пароль</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Минимум 6 символов"
          required
          autocomplete="new-password"
        />
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading()">
        @if (loading()) {
          Создание аккаунта...
        } @else {
          Создать аккаунт
        }
      </button>
    </form>

    <p class="auth-link">
      Уже есть аккаунт? <a routerLink="/auth/login">Войти</a>
    </p>
  </div>
</div>
