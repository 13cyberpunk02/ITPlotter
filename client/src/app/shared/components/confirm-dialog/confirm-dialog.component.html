<div class="overlay" (click)="cancelled.emit()" role="dialog" aria-modal="true" [attr.aria-label]="title()">
  <div class="dialog glass-strong" (click)="$event.stopPropagation()">
    <h3 class="dialog-title">{{ title() }}</h3>
    <p class="dialog-message">{{ message() }}</p>
    <div class="dialog-actions">
      <button type="button" class="btn btn-secondary" (click)="cancelled.emit()">
        {{ cancelLabel() }}
      </button>
      <button type="button" class="btn btn-danger" (click)="confirmed.emit()">
        {{ confirmLabel() }}
      </button>
    </div>
  </div>
</div>
