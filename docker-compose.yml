services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: itplotter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  cups:
    image: olbat/cupsd:latest
    ports:
      - "631:631"
    volumes:
      - cups_data:/etc/cups
      - ./cups/cupsd.conf:/etc/cups/cupsd.conf

  api:
    build:
      context: .
      dockerfile: src/ITPlotter.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=itplotter;Username=postgres;Password=postgres
      - Minio__Endpoint=minio:9000
      - Minio__AccessKey=minioadmin
      - Minio__SecretKey=minioadmin
      - Cups__BaseUrl=http://cups:631
      - Cups__User=print
      - Cups__Password=print
    depends_on:
      - postgres
      - minio
      - cups

volumes:
  postgres_data:
  minio_data:
  cups_data:
